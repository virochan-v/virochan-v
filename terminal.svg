<svg viewBox="0 0 800 492" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Neon glow filter -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Strong glow for name -->
  <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Pulse glow for status dot -->
  <filter id="glow3" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Scanline CRT effect -->
  <pattern id="scan" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
    <rect width="800" height="1" y="3" fill="rgba(0,0,0,0.10)"/>
  </pattern>

  <style>
    text { font-family: 'Courier New', Courier, monospace; }
    .l   { opacity: 0; }
    .l01 { animation: ap .15s  0.30s forwards; }
    .l02 { animation: ap .15s  0.55s forwards; }
    .l03 { animation: ap .15s  1.50s forwards; }
    .l04 { animation: ap .15s  1.90s forwards; }
    .l05 { animation: ap .15s  2.25s forwards; }
    .l06 { animation: ap .15s  2.50s forwards; }
    .l07 { animation: ap .15s  2.70s forwards; }
    .l08 { animation: ap .15s  2.90s forwards; }
    .l09 { animation: ap .15s  3.10s forwards; }
    .l10 { animation: ap .15s  3.30s forwards; }
    .l11 { animation: ap .15s  3.50s forwards; }
    .l12 { animation: ap .15s  3.70s forwards; }
    .l13 { animation: ap .15s  3.90s forwards; }
    .l14 { animation: ap .15s  4.10s forwards; }
    .l15 { animation: ap .15s  4.30s forwards; }
    .l16 { animation: ap .15s  4.50s forwards; }
    .l17 { animation: ap .15s  4.75s forwards; }
    .l18 { animation: ap .15s  5.05s forwards; }
    .l19 { animation: ap .15s  5.35s forwards; }
    .cur { opacity: 0; animation: blink .85s 5.6s infinite; }
    @keyframes ap    { to { opacity: 1; } }
    @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
  </style>
</defs>

<!-- ── Terminal Shell ── -->
<rect width="800" height="492" rx="12" fill="#0D1117"/>

<!-- Title bar -->
<rect width="800" height="36" rx="12" fill="#161B22"/>
<rect y="22"  width="800" height="14" fill="#161B22"/>

<!-- Traffic lights -->
<circle cx="22" cy="18" r="6" fill="#FF5F57"/>
<circle cx="44" cy="18" r="6" fill="#FEBC2E"/>
<circle cx="66" cy="18" r="6" fill="#28C840"/>

<!-- Title -->
<text x="400" y="22" fill="#6E7681" font-size="12" text-anchor="middle">virochan@profile — boot.sh</text>

<!-- Scanlines -->
<rect width="800" height="492" fill="url(#scan)" rx="12" opacity="0.5"/>


<!-- ══════════════ CONTENT ══════════════ -->

<!-- L01  $ java -jar VirochanProfile.jar -->
<g class="l l01">
  <text x="20"  y="62" fill="#00FF9C" font-size="13" font-weight="bold" filter="url(#glow)">root@virochan</text>
  <text x="147" y="62" fill="#C9D1D9" font-size="13">:~$  java -jar VirochanProfile.jar</text>
</g>

