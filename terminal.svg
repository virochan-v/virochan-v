  <text x="80"  y="80" fill="#C9D1D9" font-size="12">Initializing profile system ...</text>
</g>

<!-- Progress bar bg (appears with L02) -->
<rect x="80" y="87" width="530" height="12" rx="2" fill="#161B22" class="l l02"/>

<!-- Progress bar fill — SMIL width animation -->
<rect x="80" y="87" height="12" rx="2" fill="#00FF9C" filter="url(#glow)" width="0">
  <animate attributeName="width" from="0" to="530" dur="0.70s" begin="0.60s" fill="freeze"/>
</rect>

