name: Update README — Recent Activity

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:          # allows manual trigger from Actions tab

jobs:
  update-readme:
    name: Update README with latest GitHub activity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update activity section
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: 'chore: update recent activity [skip ci]'
          MAX_LINES: 5
          README_FILE: 'README.md'
          TARGET_COMMENTS: 'START_SECTION:activity,END_SECTION:activity'
